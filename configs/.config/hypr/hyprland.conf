# ┏┳┓┏━┓┏┓╻╻╺┳╸┏━┓┏━┓┏━┓
# ┃┃┃┃ ┃┃┗┫┃ ┃ ┃ ┃┣┳┛┗━┓
# ╹ ╹┗━┛╹ ╹╹ ╹ ┗━┛╹┗╸┗━┛

monitorv2 {
  output = DP-2
  mode = 2560x1440@120
  # position = auto
  position = auto-left
  scale = auto
  bitdepth = 10
  cm = hdredid
  vrr = 0
  sdrbrightness = 1.4
  sdrsaturation = 0.98
  supports_wide_color = true
  supports_hdr = true
  sdr_min_luminance = 0.005
  sdr_max_luminance = 200
  min_luminance = 0
  max_luminance = 570
  max_avg_luminance = 275
}

render {
  direct_scanout = 0
  cm_auto_hdr = 2
}

monitorv2 {
  output = HDMI-A-3
  mode = 1920x1080@75
  position = auto
  scale = auto
  # transform = 3
}


# monitor = ,preferred,auto,auto

render {
    cm_enabled = true
    cm_auto_hdr = 1
}

# ╺┳┓┏━╸┏━╸┏━┓╻ ╻╻  ╺┳╸┏━┓
#  ┃┃┣╸ ┣╸ ┣━┫┃ ┃┃   ┃ ┗━┓
# ╺┻┛┗━╸╹  ╹ ╹┗━┛┗━╸ ╹ ┗━┛

$mainMod = SUPER
$term = ghostty
$editor = code --ozone-platform-hint=wayland --disable-gpu
$file = dolphin
$browser = floorp


# ┏━╸┏┓╻╻ ╻╻┏━┓┏━┓┏┓╻┏┳┓┏━╸┏┓╻╺┳╸
# ┣╸ ┃┗┫┃┏┛┃┣┳┛┃ ┃┃┗┫┃┃┃┣╸ ┃┗┫ ┃
# ┗━╸╹ ╹┗┛ ╹╹┗╸┗━┛╹ ╹╹ ╹┗━╸╹ ╹ ╹

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = XDG_MENU_PREFIX,arch-
env = GDK_SCALE,1
env = DXVK_HDR,1
env = ENABLE_HDR_WSI,1


# ┏━┓╻ ╻╺┳╸┏━┓┏━┓╺┳╸┏━┓┏━┓╺┳╸
# ┣━┫┃ ┃ ┃ ┃ ┃┗━┓ ┃ ┣━┫┣┳┛ ┃
# ╹ ╹┗━┛ ╹ ┗━┛┗━┛ ╹ ╹ ╹╹┗╸ ╹

# XDPH stuff
exec-once = resetxdgportal.sh # reset XDPH for screenshare
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # for XDPH
exec-once = dbus-update-activation-environment --systemd --all # for XDPH
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # for XDPH

# Daemons
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = udiskie --no-automount --smart-tray
exec-once = dunst
exec-once = waybar
exec-once = nm-applet --indicator

# Scripts
exec-once = wallpaper.sh init # start wallpaper daemon
exec-once = batterynotify.sh # battery notification
exec-once = ~/.config/eww/scripts/start.sh

# Clipboard
exec-once = wl-paste --type text --watch cliphist store # clipboard store text data
exec-once = wl-paste --type image --watch cliphist store # clipboard store image data


# ╻┏┓╻┏━┓╻ ╻╺┳╸
# ┃┃┗┫┣━┛┃ ┃ ┃
# ╹╹ ╹╹  ┗━┛ ╹

# general
general {
  layout = dwindle
}
dwindle {
    preserve_split = yes
}

# inputs
input {
  kb_layout = us
  follow_mouse = 1
  sensitivity = 0
  force_no_accel = 1

  touchpad {
    natural_scroll = yes
  }
}

# device configs
device {
  name = epic mouse V1
  sensitivity = -0.5
}

# gestures for laptop
# gestures {
#   workspace_swipe = true
#   workspace_swipe_fingers = 3
# }

windowrule {
  name = Jetbrains
  match:class = jetbrains-toolbox
  float = on
  center = on
  pin = on
}


# █▀▄▀█ █ █▀ █▀▀
# █░▀░█ █ ▄█ █▄▄

# See https://wiki.hyprland.org/Configuring/Variables/

misc {
  vrr = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

xwayland {
  force_zero_scaling = true
}


# █▀ █▀█ █░█ █▀█ █▀▀ █▀▀
# ▄█ █▄█ █▄█ █▀▄ █▄▄ ██▄

source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/nvidia.conf
